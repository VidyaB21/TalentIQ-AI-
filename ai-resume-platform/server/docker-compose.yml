version: "3.8"
services:
  mongodb:
    image: mongo:7
    ports: ["27017:27017"]
    volumes: [mongo_data:/data/db]

  redis:
    image: redis:alpine
    ports: ["6379:6379"]

  ai-service:
    build: ./ai-service
    ports: ["8000:8000"]
    depends_on: [mongodb]

  server:
    build: ./server
    ports: ["5000:5000"]
    environment:
      - MONGO_URI=mongodb://mongodb:27017/resumeai
      - JWT_SECRET=your_secret_here
      - AI_SERVICE_URL=http://ai-service:8000
    depends_on: [mongodb, redis, ai-service]

  client:
    build: ./client
    ports: ["3000:3000"]
    depends_on: [server]

volumes:
  mongo_data: